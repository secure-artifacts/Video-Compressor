name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build (Debug)
        run: |
          xcodebuild \
            -project "Video-Compressor.xcodeproj" \
            -target "Video-Compressor" \
            -configuration Debug \
            build
