name: CodeQL

on:
  push:
    branches: [ "main" ]        # ✅ 只在主分支 push 时触发，不是所有分支
  pull_request:
    branches: [ "main" ]        # ✅ 只分析目标 main 的 PR
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    runs-on: macos-15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app/Contents/Developer

      # ✅ 缓存 SPM 依赖，避免每次重新下载
      - name: Cache Swift Package Manager
        uses: actions/cache@v4
        with:
          path: |
            ~/.spm-cache
            ~/Library/Caches/org.swift.swiftpm
            .build
          key: ${{ runner.os }}-spm-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      # ✅ 缓存 DerivedData，实现增量编译
      - name: Cache DerivedData
        uses: actions/cache@v4
        with:
          path: ~/Library/Developer/Xcode/DerivedData
          key: ${{ runner.os }}-derived-${{ hashFiles('**/*.xcodeproj/project.pbxproj') }}
          restore-keys: |
            ${{ runner.os }}-derived-

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: swift
          build-mode: manual

      # ✅ 去掉 clean，利用增量编译；-jobs 并行加速
      - name: Build project
        run: |
          xcodebuild build \
            -project "Video-Compressor.xcodeproj" \
            -target "Video-Compressor" \
            -jobs $(sysctl -n hw.logicalcpu) \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:swift"
